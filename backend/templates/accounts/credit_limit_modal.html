<div class="app-modal-content space-y-4 p-4">
    <div class="flex items-center justify-between">
        <h3 class="app-title-sm">Limite do cartão</h3>
        <button type="button" onclick="window.financeApp.closeModal()" class="app-mini-btn" aria-label="Fechar modal">
            Fechar
        </button>
    </div>

    <form
        hx-post="{% url 'accounts:credit-limit' %}"
        hx-target="#modal-content"
        hx-swap="innerHTML"
        class="space-y-3"
    >
        {% include "partials/form_fields.html" %}
        <button type="submit" class="app-btn-primary w-full">Salvar limite</button>
    </form>
</div>
