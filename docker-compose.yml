services:
  # db/redis sao add-ons gerenciados na Heroku (heroku-postgresql:essential-0
  # e bucketeer/Redis), nao dynos — os limites aqui sao so pra nao deixar
  # esses containers consumirem recursos ilimitados na maquina local.
  db:
    image: postgres:17-alpine
    container_name: nexo-gestao-financeira-postgres
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexo}
      POSTGRES_USER: ${POSTGRES_USER:-nexo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexo}
    ports:
      # Publicado para permitir "npm run dev" (Django rodando fora do Docker)
      # conectar em localhost:5432, alem do uso interno pelos containers backend/worker/beat.
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexo} -d ${POSTGRES_DB:-nexo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    ports:
      # Publicado pelo mesmo motivo do db: "npm run dev" conecta em localhost:6379.
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # backend/worker/beat rodam a mesma imagem que vai pro dyno "web" da Heroku
  # (plano Eco: 512 MB RAM, 1 vCPU compartilhada) — os limites abaixo
  # espelham isso, pra bug de estouro de memoria aparecer localmente antes
  # de acontecer em producao, em vez de so a maquina local absorver.
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    image: nexo-gestao-financeira:latest
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-nexo}:${POSTGRES_PASSWORD:-nexo}@db:5432/${POSTGRES_DB:-nexo}
      REDIS_URL: redis://redis:6379/0
      SERVE_REACT_APP: "true"
    ports:
      - "${WEB_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn core.wsgi --bind 0.0.0.0:8000 --workers 3 --threads 2 --worker-class gthread --log-file - --access-logfile - --access-logformat '%(h)s %(r)s %(s)s %(L)ss'"
    volumes:
      - media_data:/app/backend/media

  worker:
    # Sem build: proprio - reaproveita a imagem buildada pelo backend.
    # "docker compose build worker" sozinho nao faz nada; use "docker compose up --build".
    image: nexo-gestao-financeira:latest
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-nexo}:${POSTGRES_PASSWORD:-nexo}@db:5432/${POSTGRES_DB:-nexo}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: celery -A core worker --loglevel=info --concurrency=2
    volumes:
      - media_data:/app/backend/media

  beat:
    # Agenda diaria (ver CELERY_BEAT_SCHEDULE em core/settings.py) que
    # dispara o lembrete de contas a vencer. Sem build proprio, mesma
    # ideia do worker: reaproveita a imagem buildada pelo backend.
    image: nexo-gestao-financeira:latest
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-nexo}:${POSTGRES_PASSWORD:-nexo}@db:5432/${POSTGRES_DB:-nexo}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: celery -A core beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
  media_data:
