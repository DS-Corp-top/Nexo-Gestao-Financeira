name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  HEROKU_APP_NAME: nexo-gestao-financeira

jobs:
  deploy:
    name: Deploy to Heroku
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: nexo-gestao-financeira
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Push to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          git push "https://heroku:${HEROKU_API_KEY}@git.heroku.com/${HEROKU_APP_NAME}.git" "HEAD:refs/heads/main" --force
