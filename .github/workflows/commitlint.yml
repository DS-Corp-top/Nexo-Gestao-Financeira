name: Commit Lint

# Valida Conventional Commits (fix:, feat:, chore:, docs:, style:, refactor:,
# perf:, test:, build:, ci:, revert: — ver Gestao-de-projetos na raiz do repo)
# tanto em push direto quanto em pull request, em qualquer branch.
on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  commitlint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json
