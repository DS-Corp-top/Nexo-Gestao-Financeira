build:
  docker:
    web: Dockerfile
run:
  release:
    command:
      - python manage.py check_react_build && python manage.py migrate --noinput
    image: web
  web: gunicorn core.wsgi --bind 0.0.0.0:$PORT --workers 3 --threads 2 --worker-class gthread --log-file -
  worker:
    command:
      - celery -A core worker --loglevel=info --concurrency=2
    image: web
  # Sem processo "beat" aqui de proposito (evita pagar um dyno so pra isso).
  # Os lembretes de contas a vencer (notifications/tasks.py) sao disparados
  # no Heroku pelo addon Heroku Scheduler, chamando diariamente:
  #   python manage.py send_due_push_notifications
  # Localmente (docker compose) quem dispara isso e o servico "beat".
