<script>
    (function () {
        const form = document.querySelector("{{ form_selector|escapejs }}");
        if (!form) {
            return;
        }

        const recurrenceField = form.querySelector('[name="recurrence_type"]');
        const installmentField = form.querySelector('[name="installment_count"]');
        const intervalUnitField = form.querySelector('[name="recurrence_interval_unit"]');
        const txTypeField = form.querySelector('[name="transaction_type"]');
        const destField = form.querySelector('[name="destination_account"]');

        if (!recurrenceField) {
            return;
        }

        const installmentWrapper = installmentField ? installmentField.closest("div.space-y-1") : null;
        const intervalUnitWrapper = intervalUnitField ? intervalUnitField.closest("div.space-y-1") : null;
        const destWrapper = destField ? destField.closest("div.space-y-1") : null;

        const toggleFields = function () {
            const isInstallment = recurrenceField.value === "installment";
            const showInterval = !(recurrenceField.value === "fixed" || recurrenceField.value === "once");

            if (installmentWrapper) {
                installmentWrapper.classList.toggle("hidden", !isInstallment);
            }

            if (intervalUnitWrapper) {
                intervalUnitWrapper.classList.toggle("hidden", !showInterval);
            }
        };

        const syncDestinationOptions = function () {
            if (!txTypeField || !destField) {
                return;
            }

            const sourceValue = form.querySelector('[name="account"]')?.value || "";
            Array.from(destField.options).forEach((option) => {
                if (!option.value) {
                    return;
                }
                option.disabled = !!(
                    sourceValue &&
                    option.value === sourceValue &&
                    option.value !== destField.value
                );
            });
        };

        const toggleTransfer = function () {
            if (!destWrapper) {
                return;
            }

            const isTransfer = txTypeField && txTypeField.value === "transfer";
            destWrapper.classList.toggle("hidden", !isTransfer);
            if (destField) {
                destField.required = isTransfer;
            }
            syncDestinationOptions();
        };

        const accountField = form.querySelector('[name="account"]');
        const categoryField = form.querySelector('[name="category"]');
        const categoryTypes = {{ form.get_category_types_json|safe }};

        if (categoryField) {
            Array.from(categoryField.options).forEach(function (option) {
                if (option.value && categoryTypes[option.value]) {
                    option.setAttribute("data-category-type", categoryTypes[option.value]);
                }
            });
        }

        const filterCategories = function () {
            if (!txTypeField || !categoryField) {
                return;
            }

            const txType = txTypeField.value;
            const expectedType = txType === "income" ? "income" : txType === "expense" ? "expense" : null;
            Array.from(categoryField.options).forEach(function (option) {
                if (!option.value) {
                    return;
                }
                const categoryType = option.getAttribute("data-category-type");
                const hide = expectedType && categoryType && categoryType !== expectedType;
                option.hidden = hide;
                option.disabled = hide;
                if (hide && categoryField.value === option.value) {
                    categoryField.value = "";
                }
            });
        };

        recurrenceField.addEventListener("change", toggleFields);
        if (txTypeField) {
            txTypeField.addEventListener("change", function () {
                toggleTransfer();
                filterCategories();
            });
        }
        if (accountField) {
            accountField.addEventListener("change", syncDestinationOptions);
        }

        toggleFields();
        toggleTransfer();
        filterCategories();
    })();
</script>
