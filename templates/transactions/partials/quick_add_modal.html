<div class="app-modal-content space-y-4 p-4">
    <div class="flex items-center justify-between">
        <h3 class="app-title-sm">Nova transacao</h3>
        <button type="button" onclick="window.financeApp.closeModal()" class="app-mini-btn" aria-label="Fechar modal">
            Fechar
        </button>
    </div>

    <form
        id="quick-transaction-form"
        hx-post="{% url 'transactions:quick-add' %}"
        hx-target="#modal-content"
        hx-swap="innerHTML"
        class="space-y-3"
    >
        {% include "partials/form_fields.html" %}
        <button type="submit" class="app-btn-primary w-full">Salvar transacao</button>
    </form>
</div>

{% include "transactions/partials/form_behavior_script.html" with form_selector="#quick-transaction-form" %}
